<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cluber · Mockup (Soft-Clay)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/variable/pretendardvariable-dynamic-subset.css">
<style>
:root{
  --canvas:#F4F1FA; --fg:#332F3A; --muted:#635F69;
  --violet:#7C3AED; --pink:#DB2777; --teal:#10B981; --amber:#F59E0B; --danger:#EF4444;
  --grad:linear-gradient(135deg,#A78BFA,#7C3AED);
  --r-card:28px; --r-btn:18px; --r-inner:14px;
  --sh-out:8px 8px 18px rgba(174,167,193,.55), -8px -8px 18px rgba(255,255,255,.9);
  --sh-hover:11px 11px 24px rgba(174,167,193,.6), -11px -11px 24px rgba(255,255,255,.95);
  --sh-sm:5px 5px 11px rgba(174,167,193,.5), -5px -5px 11px rgba(255,255,255,.9);
  --sh-in:inset 5px 5px 10px rgba(174,167,193,.5), inset -5px -5px 10px rgba(255,255,255,.9);
  --sh-in-deep:inset 10px 10px 20px rgba(174,167,193,.7), inset -10px -10px 20px rgba(255,255,255,.6);
  --sh-clay:12px 12px 24px rgba(124,58,237,.30), -8px -8px 16px rgba(255,255,255,.85), inset 4px 4px 8px rgba(255,255,255,.45), inset -5px -5px 10px rgba(91,33,182,.18);
}
*{box-sizing:border-box;}
body{margin:0;background:var(--canvas);color:var(--fg);font-family:"DM Sans","Pretendard Variable",Pretendard,system-ui,sans-serif;overflow-x:hidden;}
svg{display:block;}
.blob{position:fixed;border-radius:50%;filter:blur(70px);opacity:.12;z-index:-1;animation:float 12s ease-in-out infinite;}
.blob.v{width:46vh;height:46vh;background:#8B5CF6;top:-8%;left:-6%;}
.blob.p{width:40vh;height:40vh;background:#DB2777;bottom:-10%;right:-6%;animation-delay:3s;}
@keyframes float{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-22px) rotate(4deg)}}
@media (prefers-reduced-motion: reduce){.blob{animation:none;} *{transition:none!important;}}
h1,h2,.value,.brand{font-family:"Nunito","Pretendard Variable",Pretendard,sans-serif;}
a:focus-visible,button:focus-visible,input:focus-visible{outline:2px solid var(--violet);outline-offset:2px;}
.wrap{max-width:1080px;margin:0 auto;padding:26px 20px 64px;}
header{display:flex;align-items:center;justify-content:space-between;gap:16px;background:var(--canvas);border-radius:var(--r-btn);padding:14px 22px;box-shadow:var(--sh-out);margin-bottom:26px;}
.brandwrap{display:flex;align-items:center;gap:12px;}
.brand-mark{width:40px;height:40px;border-radius:12px;background:var(--grad);display:grid;place-items:center;color:#fff;box-shadow:var(--sh-clay);}
.brand-mark svg{width:22px;height:22px;}
.brand{font-weight:900;font-size:24px;letter-spacing:-.02em;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
nav{display:flex;gap:8px;}
nav a{font-weight:700;font-size:14px;color:var(--muted);padding:10px 16px;border-radius:var(--r-inner);transition:all .25s ease-out;text-decoration:none;}
nav a.active{color:var(--violet);box-shadow:var(--sh-in);}
nav a:hover{color:var(--fg);transform:translateY(-1px);}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:28px;}
.stat{background:var(--canvas);border-radius:var(--r-card);padding:22px;box-shadow:var(--sh-out);transition:all .3s ease-out;}
.stat:hover{transform:translateY(-4px);box-shadow:var(--sh-hover);}
.orb-well{width:62px;height:62px;border-radius:18px;box-shadow:var(--sh-in-deep);display:grid;place-items:center;margin-bottom:14px;}
.orb{width:44px;height:44px;border-radius:50%;display:grid;place-items:center;color:#fff;box-shadow:var(--sh-clay);}
.orb svg{width:22px;height:22px;}
.orb.v{background:linear-gradient(135deg,#A78BFA,#7C3AED);}
.orb.p{background:linear-gradient(135deg,#F472B6,#DB2777);}
.orb.b{background:linear-gradient(135deg,#7DD3FC,#0EA5E9);}
.orb.a{background:linear-gradient(135deg,#FCD34D,#F59E0B);}
.stat .label{font-size:13px;color:var(--muted);}
.stat .value{font-weight:900;font-size:26px;margin-top:2px;}
h2.section{font-size:20px;font-weight:800;margin:0 0 4px;}
.muted{color:var(--muted);font-size:13px;}
.toolbar{display:flex;gap:14px;align-items:center;margin:16px 0 20px;}
.search{flex:1;display:flex;align-items:center;gap:10px;background:var(--canvas);border-radius:var(--r-btn);padding:13px 18px;box-shadow:var(--sh-in-deep);}
.search svg{width:18px;height:18px;color:var(--muted);flex:none;}
.search input{border:0;outline:0;background:transparent;font:inherit;color:var(--fg);width:100%;}
.search input::placeholder{color:#8B7FA8;}
.btn{display:inline-flex;align-items:center;gap:8px;font:inherit;font-weight:700;cursor:pointer;border:0;border-radius:var(--r-btn);padding:13px 22px;background:var(--canvas);color:var(--fg);box-shadow:var(--sh-out);transition:all .2s ease-out;}
.btn svg{width:18px;height:18px;}
.btn:hover{transform:translateY(-2px);box-shadow:var(--sh-hover);}
.btn:active{transform:scale(.96);box-shadow:var(--sh-in);}
.btn.primary{background:var(--grad);color:#fff;box-shadow:var(--sh-clay);}
.btn.primary:hover{transform:translateY(-2px);filter:brightness(1.03);}
.panel{background:var(--canvas);border-radius:var(--r-card);padding:16px;box-shadow:var(--sh-out);}
.row{display:grid;grid-template-columns:1.5fr 1fr 1.1fr 1.2fr auto;align-items:center;gap:12px;padding:15px 18px;border-radius:var(--r-btn);transition:all .25s ease-out;}
.row:hover{box-shadow:var(--sh-sm);transform:translateY(-2px);}
.name{font-weight:700;}
.sub{font-size:12px;color:var(--muted);}
.badge{display:inline-block;font-size:12px;font-weight:700;padding:6px 13px;border-radius:9999px;color:#fff;}
.badge.officer{background:var(--grad);}
.badge.general{background:var(--canvas);color:var(--muted);box-shadow:var(--sh-in);}
.badge.paid{background:linear-gradient(135deg,#34D399,#10B981);}
.badge.unpaid{background:linear-gradient(135deg,#FCD34D,#F59E0B);}
.fee{font-family:"Nunito",Pretendard,sans-serif;font-weight:800;}
.actions{display:flex;gap:8px;}
.icon-btn{width:40px;height:40px;border-radius:var(--r-inner);background:var(--canvas);box-shadow:var(--sh-in-deep);display:grid;place-items:center;cursor:pointer;border:0;color:var(--fg);transition:all .2s ease-out;}
.icon-btn svg{width:18px;height:18px;}
.icon-btn:hover{transform:translateY(-1px);box-shadow:var(--sh-out);}
.icon-btn:active{transform:scale(.92);box-shadow:var(--sh-in-deep);}
.icon-btn.danger{color:var(--danger);}
@media(max-width:820px){.stats{grid-template-columns:repeat(2,1fr);}nav{display:none;}.row{grid-template-columns:1fr auto;}.row .hide{display:none;}}
</style>
</head>
<body>
