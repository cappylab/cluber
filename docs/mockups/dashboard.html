<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>동아리 관리 · Mockup (Neumorphism)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#E0E5EC; --fg:#3D4852; --muted:#6B7280;
  --accent:#6C63FF; --accent-2:#38B2AC;
  --r-card:32px; --r-btn:16px; --r-inner:12px;
  --sh-out:9px 9px 16px rgba(163,177,198,.6), -9px -9px 16px rgba(255,255,255,.5);
  --sh-out-hover:12px 12px 20px rgba(163,177,198,.7), -12px -12px 20px rgba(255,255,255,.6);
  --sh-sm:5px 5px 10px rgba(163,177,198,.6), -5px -5px 10px rgba(255,255,255,.5);
  --sh-in:inset 6px 6px 10px rgba(163,177,198,.6), inset -6px -6px 10px rgba(255,255,255,.5);
  --sh-in-deep:inset 10px 10px 20px rgba(163,177,198,.7), inset -10px -10px 20px rgba(255,255,255,.6);
}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--fg);font-family:"DM Sans",system-ui,sans-serif;}
a{color:inherit;text-decoration:none;}
.wrap{max-width:1100px;margin:0 auto;padding:28px 20px 64px;}
header{display:flex;align-items:center;justify-content:space-between;gap:16px;background:var(--bg);
  border-radius:var(--r-btn);padding:16px 22px;box-shadow:var(--sh-out);margin-bottom:28px;}
.brand{font-family:"Plus Jakarta Sans";font-weight:800;font-size:20px;letter-spacing:-.02em;}
nav{display:flex;gap:10px;}
nav a{font-weight:500;font-size:14px;color:var(--muted);padding:10px 16px;border-radius:var(--r-inner);transition:all .3s ease-out;}
nav a.active{color:var(--accent);box-shadow:var(--sh-in);}
nav a:hover{color:var(--fg);}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:30px;}
.stat{background:var(--bg);border-radius:var(--r-card);padding:22px;box-shadow:var(--sh-out);transition:transform .3s ease-out,box-shadow .3s ease-out;}
.stat:hover{transform:translateY(-2px);box-shadow:var(--sh-out-hover);}
.stat .ico{width:48px;height:48px;display:grid;place-items:center;border-radius:var(--r-inner);box-shadow:var(--sh-in-deep);font-size:22px;margin-bottom:14px;}
.stat .label{font-size:13px;color:var(--muted);}
.stat .value{font-family:"Plus Jakarta Sans";font-weight:800;font-size:26px;letter-spacing:-.02em;margin-top:2px;}
.section{font-family:"Plus Jakarta Sans";font-weight:700;font-size:18px;margin:0 0 4px;}
.muted{color:var(--muted);font-size:13px;}
.toolbar{display:flex;gap:14px;align-items:center;margin:16px 0 22px;}
.search{flex:1;display:flex;align-items:center;gap:10px;background:var(--bg);border-radius:var(--r-btn);padding:12px 18px;box-shadow:var(--sh-in);}
.search input{border:0;outline:0;background:transparent;font:inherit;color:var(--fg);width:100%;}
.search input::placeholder{color:#A0AEC0;}
.btn{font:inherit;font-weight:700;cursor:pointer;border:0;border-radius:var(--r-btn);padding:13px 20px;background:var(--bg);color:var(--fg);box-shadow:var(--sh-out);transition:all .3s ease-out;}
.btn:hover{transform:translateY(-1px);box-shadow:var(--sh-out-hover);}
.btn:active{transform:translateY(.5px);box-shadow:var(--sh-sm);}
.btn.primary{background:var(--accent);color:#fff;box-shadow:6px 6px 12px rgba(108,99,255,.35),-6px -6px 12px rgba(255,255,255,.4);}
.panel{background:var(--bg);border-radius:var(--r-card);padding:18px;box-shadow:var(--sh-out);}
.row{display:grid;grid-template-columns:1.4fr 1fr 1.2fr 1.1fr auto;align-items:center;gap:12px;padding:16px 18px;border-radius:var(--r-btn);transition:all .3s ease-out;}
.row:hover{box-shadow:var(--sh-sm);transform:translateY(-1px);}
.name{font-weight:700;}
.sub{font-size:12px;color:var(--muted);}
.badge{display:inline-block;font-size:12px;font-weight:500;padding:6px 12px;border-radius:9999px;box-shadow:var(--sh-in);}
.badge.officer{color:var(--accent);}
.badge.paid{color:var(--accent-2);}
.badge.unpaid{color:#E05252;}
.fee{font-family:"Plus Jakarta Sans";font-weight:700;}
.actions{display:flex;gap:8px;}
.icon-btn{width:40px;height:40px;border-radius:var(--r-inner);background:var(--bg);box-shadow:var(--sh-sm);display:grid;place-items:center;cursor:pointer;border:0;font-size:15px;transition:all .3s ease-out;}
.icon-btn:hover{transform:translateY(-1px);box-shadow:var(--sh-out);}
.icon-btn:active{box-shadow:var(--sh-in);}
@media(max-width:820px){
  .stats{grid-template-columns:repeat(2,1fr);}
  nav{display:none;}
  .row{grid-template-columns:1fr auto;}
  .row .hide{display:none;}
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">🎫 우리 동아리</div>
    <nav>
      <a class="active" href="#">대시보드</a>
      <a href="#">회원 목록</a>
      <a href="#">회비 랭킹</a>
    </nav>
    <button class="btn">로그아웃</button>
  </header>

  <div class="stats">
    <div class="stat"><div class="ico">👥</div><div class="label">전체 회원</div><div class="value">24명</div></div>
    <div class="stat"><div class="ico">💰</div><div class="label">총 회비</div><div class="value">1,200,000원</div></div>
    <div class="stat"><div class="ico">📊</div><div class="label">평균 회비</div><div class="value">50,000원</div></div>
    <div class="stat"><div class="ico">⏳</div><div class="label">미납 회원</div><div class="value">5명</div></div>
  </div>

  <h2 class="section">회원 목록</h2>
  <div class="muted">이름 또는 연락처로 검색하고, 회비를 납부·관리하세요.</div>

  <div class="toolbar">
    <div class="search">🔍 <input placeholder="이름 또는 연락처 검색"></div>
    <button class="btn">필터</button>
    <button class="btn primary">+ 회원 추가</button>
  </div>

  <div class="panel">
    <div class="row">
      <div><div class="name">홍길동</div><div class="sub">학번 20266126</div></div>
      <div><span class="badge officer">운영진 · 회장</span></div>
      <div class="hide sub">010-1234-5678</div>
      <div><span class="fee">120,000원</span> <span class="badge paid">납부</span></div>
      <div class="actions"><button class="icon-btn">💳</button><button class="icon-btn">✏️</button><button class="icon-btn">🗑️</button></div>
    </div>
    <div class="row">
      <div><div class="name">김철수</div><div class="sub">학번 20266127</div></div>
      <div><span class="badge">일반회원</span></div>
      <div class="hide sub">010-2345-6789</div>
      <div><span class="fee">50,000원</span> <span class="badge paid">납부</span></div>
      <div class="actions"><button class="icon-btn">💳</button><button class="icon-btn">✏️</button><button class="icon-btn">🗑️</button></div>
    </div>
    <div class="row">
      <div><div class="name">이영희</div><div class="sub">학번 20266128</div></div>
      <div><span class="badge">일반회원</span></div>
      <div class="hide sub">010-3456-7890</div>
      <div><span class="fee">0원</span> <span class="badge unpaid">미납</span></div>
      <div class="actions"><button class="icon-btn">💳</button><button class="icon-btn">✏️</button><button class="icon-btn">🗑️</button></div>
    </div>
  </div>
</div>
</body>
</html>
